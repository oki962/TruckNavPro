<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckNav Pro</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=5">
</head>

<body>
    <div class="simple-search-bar" id="simple-search-bar">
        <div class="input-wrapper autocomplete-container">
            <input type="text" class="place-input pill-input" id="input-simple-search" placeholder="Dokąd jedziemy?">
        </div>
    </div>

    <div class="bottom-action-bar" id="bottom-action-bar">
        <div class="address-preview" id="address-preview-text">Wybrany adres...</div>
        <button class="btn-navigate" onclick="openFullPanel()">Prowadź</button>
    </div>

    <div class="search-panel" id="full-search-panel" style="display: none;">
        <div class="route-inputs">
            <div id="sortable-route-list">
                <div class="input-wrapper autocomplete-container route-point">
                    <div class="drag-handle">⋮⋮</div>
                    <input type="text" class="place-input" id="input-start" placeholder="Punkt Startowy...">
                    <input type="hidden" class="lat-val" id="lat-start"><input type="hidden" class="lng-val" id="lng-start">
                    <button class="icon-btn remove-btn" onclick="removePoint(this)" style="display:none;">✖</button>
                </div>

                <div class="input-wrapper autocomplete-container route-point" style="margin-top: 6px;">
                    <div class="drag-handle">⋮⋮</div>
                    <input type="text" class="place-input" id="input-dest" placeholder="Cel docelowy...">
                    <input type="hidden" class="lat-val" id="lat-dest"><input type="hidden" class="lng-val" id="lng-dest">
                    <button class="icon-btn remove-btn" onclick="removePoint(this)" style="display:none;">✖</button>
                </div>
            </div>
            <button class="add-wp-btn" onclick="addWaypoint()">+ Dodaj przystanek</button>
        </div>

        <div class="profile-selector">
            <button class="profile-btn-main" onclick="toggleProfileMenu()">
                <span id="active-profile-name">Wczytywanie...</span>
                <span>▼</span>
            </button>
            <div class="profile-options" id="profile-options"></div>
        </div>

        <button class="calc-btn" id="calc-btn-text" onclick="calculateRoute()">Wyznacz trasę</button>
        <button class="start-drive-btn" id="start-drive-btn" onclick="startNavigation()" style="display:none; margin-top: 8px;">🚀 Zacznij Jazdę</button>
    </div>

    <!-- Pływający przycisk zakończenia nawigacji (Zakończ jazdę) -->
    <button class="stop-drive-btn" id="stop-drive-btn" onclick="stopNavigation()">🛑 Zakończ Jazdę</button>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">Parametry Pojazdu</div>

            <div class="form-group">
                <label>Nazwa własna pojazdu</label>
                <input type="text" id="v-name" placeholder="np. Zestaw Chłodnia">
            </div>

            <div class="form-group">
                <label>Typ pojazdu (Szablon)</label>
                <select id="v-type" onchange="autoFillSpecs()">
                    <option value="articulated">Ciągnik siodłowy z naczepą</option>
                    <option value="rigid">Solówka (Ciężarowy solowy)</option>
                    <option value="roadtrain">Zestaw przestrzenny (Tandem)</option>
                    <option value="tractor">Ciągnik siodłowy (sam)</option>
                    <option value="van">Samochód dostawczy (do 3.5t)</option>
                    <option value="bus">Autokar</option>
                </select>
            </div>

            <div class="form-section-title">Parametry fizyczne</div>
            <div class="grid-2">
                <div class="form-group"><label>Wysokość (m)</label><input type="number" id="v-h" step="0.1"></div>
                <div class="form-group"><label>Szerokość (m)</label><input type="number" id="v-wid" step="0.05"></div>
                <div class="form-group"><label>Długość (m)</label><input type="number" id="v-l" step="0.1"></div>
                <div class="form-group"><label>Masa całk. (t)</label><input type="number" id="v-w" step="1"></div>
                <div class="form-group"><label>Nacisk na oś (t)</label><input type="number" id="v-aw" step="0.1"></div>
                <div class="form-group"><label>Liczba osi</label><input type="number" id="v-axles" step="1"></div>
                <div class="form-group"><label>V-Max (km/h)</label><input type="number" id="v-speed" step="1"></div>
            </div>

            <div class="form-section-title">Silnik i Ekologia</div>
            <div class="grid-2">
                <div class="form-group"><label>Rok prod.</label><input type="number" id="v-year" step="1"></div>
                <div class="form-group"><label>Paliwo</label>
                    <select id="v-fuel">
                        <option value="diesel">Diesel (ON)</option>
                        <option value="lng">LNG / CNG</option>
                        <option value="electric">Elektryczny</option>
                        <option value="petrol">Benzyna</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label>Standard emisji spalin</label>
                <select id="v-euro">
                    <option value="6">Euro 6</option>
                    <option value="5">Euro 5</option>
                    <option value="4">Euro 4</option>
                    <option value="3">Euro 3 lub niższa</option>
                    <option value="eev">EEV (Enhanced Environmentally friendly Vehicle)</option>
                    <option value="zev">ZEV (Zero Emission - Elektryk)</option>
                </select>
            </div>

            <div class="form-section-title">Restrykcje i ADR</div>
            <div class="form-group">
                <label>Główna klasa ładunku (ADR)</label>
                <select id="v-adr-load">
                    <option value="">Brak (Towar neutralny)</option>
                    <option value="otherHazmat">Inne towary niebezpieczne (Ogólne)</option>
                    <option value="explosive">Materiały wybuchowe (Klasa 1)</option>
                    <option value="gas">Gazy (Klasa 2)</option>
                    <option value="flammable">Materiały łatwopalne (Klasa 3)</option>
                    <option value="harmfulToWater">Szkodliwe dla wód (WHG)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategoria Tunelu (Zakaz wjazdu)</label>
                <select id="v-adr-tunnel">
                    <option value="">Brak restrykcji (Standard)</option>
                    <option value="B">B (Ograniczenie silne)</option>
                    <option value="C">C (Ograniczenie średnie)</option>
                    <option value="D">D (Ograniczenie lekkie)</option>
                    <option value="E">E (Tylko materiały najbezpieczniejsze)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSettingsModal()">Anuluj</button>
                <button class="btn-reset" onclick="resetSettings()">Resetuj</button>
                <button class="btn-save" onclick="saveSettings()">Zapisz profil</button>
            </div>
        </div>
    </div>

    <div class="bottom-panel" id="telemetry-panel">
        <div class="telemetry-item"><span class="telemetry-label">Zostało</span><span class="telemetry-value" id="t-time">--:--</span></div>
        <div class="telemetry-item"><span class="telemetry-label">Dystans</span><span class="telemetry-value" id="t-dist">--</span></div>
        <div class="telemetry-item"><span class="telemetry-label">Korek</span><span class="telemetry-value delay" id="t-delay">--</span></div>
    </div>

    <!-- Pływający Panel POI (Filtry Overpass API) -->
    <div class="poi-panel-container">
        <button class="poi-toggle-btn" id="poi-toggle-btn" onclick="togglePoiMenu()">📍 POI</button>
        <div class="poi-menu" id="poi-menu">
            <div class="poi-filter-item">
                <input type="checkbox" id="poi-parking" class="poi-checkbox" checked onchange="updatePoiVisibility()">
                <label for="poi-parking" class="poi-label">🅿️ Parkingi</label>
            </div>
            <div class="poi-filter-item">
                <input type="checkbox" id="poi-fuel" class="poi-checkbox" checked onchange="updatePoiVisibility()">
                <label for="poi-fuel" class="poi-label">⛽ Stacje paliw</label>
            </div>
            <div class="poi-filter-item">
                <input type="checkbox" id="poi-mop" class="poi-checkbox" checked onchange="updatePoiVisibility()">
                <label for="poi-mop" class="poi-label">☕ MOP / Odpoczynek</label>
            </div>
            <div class="poi-filter-item">
                <input type="checkbox" id="poi-layby" class="poi-checkbox" checked onchange="updatePoiVisibility()">
                <label for="poi-layby" class="poi-label">🛣️ Zatoczki</label>
            </div>
        </div>
    </div>

    <button class="recenter-btn" id="recenter-btn" onclick="recenterMap()">⌖ Centruj</button>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
